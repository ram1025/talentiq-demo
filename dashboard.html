<!DOCTYPE html>
<html>
<head><title>TalentIQ Suite</title><link rel="stylesheet" href="style.css"><meta name="viewport" content="width=device-width"></head>
<body style="background:linear-gradient(135deg,#0F766E 0%,#1E3A8A 100%);">
<div class="header"><div><h2>TalentIQ Suite 🧳</h2><p style="font-size:12px;opacity:0.9">AI-Powered Candidate Platform</p></div><button onclick="logout()" style="background:#DC2626;color:white;border:none;padding:8px 12px;border-radius:6px;">Logout</button></div>

<div style="padding:15px;"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
<div class="stat-card"><h4>Profile Views</h4><p id="views">0</p></div>
<div class="stat-card"><h4>Resume Score</h4><p id="score">0%</p></div>
<div class="stat-card"><h4>Job Matches</h4><p id="jobs">0</p></div>
</div></div>

<div class="card">
  <h3>📊 Resume Strength Meter</h3><p>Score: <b id="scoreText">0%</b></p>
  <div class="progress-bar"><div class="progress-fill" id="bar" style="width:0%"></div></div>
  <p id="scoreMsg" style="background:#FEE2E2;padding:8px;border-radius:8px;margin-top:10px;font-size:13px">Upload resume to get started</p>

  <h4 style="margin-top:20px">Step 1: Upload Resume <span class="tag">Auto Fill ON</span></h4>
  <div class="file-input-wrapper"><input type="file" id="resumeFile" accept=".pdf"></div>
  <button class="btn-primary" onclick="uploadAndParseResume()">Upload & AI Analyze</button>
</div>

<div class="card" id="verifyCard" style="display:none;">
  <h3>Step 2: Verify & Save</h3>
  <div class="form-group"><label>Full Name</label><input id="name"></div>
  <div class="form-group"><label>Current Designation</label><input id="designation"></div>
  <div class="form-group"><label>Job Status / Notice Period</label><select id="jobType"><option>Select</option><option>Immediate</option><option>30 Days</option></select></div>
  <div class="form-group"><label>Key Skills</label><input id="skills"></div>
  <div class="form-group"><label>Preferred Location</label><select id="location"><option>Select</option><option>Visakhapatnam</option><option>Hyderabad</option></select></div>
  <div class="form-group"><label>Work Mode</label><select id="workMode"><option>Select</option><option>WFO</option><option>Hybrid</option></select></div>
  <div class="form-group"><label>Total Experience (Years)</label><input id="exp"></div>
  <button class="btn-primary" onclick="saveProfile()">✓ Save & Make Profile Live</button>
  <button class="btn-danger" onclick="resetProfile()">🗑️ Reset Profile Data</button>
</div>

<nav class="bottom-nav"><button class="active">🏠<span>Home</span></button><button onclick="alert('10 Jobs Found')">📄<span>Apply</span></button><button onclick="location='profile.html'">👤<span>Profile</span></button></nav>

<script>
window.onload = function(){
    if(localStorage.getItem('talentiq_loggedin')!=='true'){ window.location.href = 'index.html'; }
    // OLD DATA CLEAR CHEYI
    if(!localStorage.getItem('resumeUploaded')){ localStorage.removeItem('talentiqProfile'); }
    loadDashboardData();
}

function loadDashboardData(){
    let profile = JSON.parse(localStorage.getItem("talentiqProfile") || '{}');
    let resumeUploaded = localStorage.getItem('resumeUploaded')==='true';
    let profileLive = localStorage.getItem('profileComplete')==='true';

    if(resumeUploaded && profile.name){
        document.getElementById('score').innerText = '100%';
        document.getElementById('scoreText').innerText = '100%';
        document.getElementById('bar').style.width = '100%';
        document.getElementById('scoreMsg').innerText = '✓ Your resume is 100% complete! Recruiters will love this.';
        document.getElementById('scoreMsg').style.background = '#DCFCE7';
        document.getElementById('verifyCard').style.display = 'block';
        document.getElementById('views').innerText = profileLive? '2' : '1';
        document.getElementById('jobs').innerText = profileLive? '10' : '0';

        document.getElementById('name').value = profile.name;
        document.getElementById('designation').value = profile.designation;
        document.getElementById('skills').value = profile.skills;
        document.getElementById('exp').value = profile.exp;
        document.getElementById('location').value = profile.location;
        document.getElementById('jobType').value = profile.jobType;
        document.getElementById('workMode').value = profile.workMode;
    }
}

// REAL PDF NAME READING - Nuvvu upload chesina file name nundi teestundi
function uploadAndParseResume(){
    let file = document.getElementById('resumeFile').files[0];
    if(!file){ alert('Please select a file'); return; }

    alert('AI is scanning your resume...');

    let fileName = file.name.toLowerCase();
    let fakeParsedData = {
        name: "CANDIDATE NAME", email: "", designation: "", exp: "", skills: "",
        location: "Select", jobType: "Select", workMode: "Select"
    };

    // NUVVE: RAM GANESH MAKINA - file name lo unna
    if(fileName.includes('ram') || fileName.includes('ganesh') || fileName.includes('makina')){
        fakeParsedData = {
            name: "RAM GANESH MAKINA",
            email: "ganesh.ram.makina@gmail.com",
            designation: "IT Support Specialist",
            exp: "9",
            skills: "Java, J2EE, Spring Boot, Recruitment, ATS",
            location: "Visakhapatnam",
            jobType: "30 Days",
            workMode: "Hybrid"
        };
    }

    localStorage.clear(); // OLD RAM KUMAR DATA DELETE
    localStorage.setItem("talentiqProfile", JSON.stringify(fakeParsedData));
    localStorage.setItem('resumeUploaded','true');
    alert('AI Auto-Fill Complete! Your details are filled ✅');
    location.reload(); // PAGE RELOAD CHESTHE KANIPISTHUNDI
}

function saveProfile(){
    let profile = JSON.parse(localStorage.getItem("talentiqProfile") || '{}');
    profile.jobType = document.getElementById('jobType').value;
    profile.location = document.getElementById('location').value;
    profile.workMode = document.getElementById('workMode').value;
    profile.exp = document.getElementById('exp').value;
    localStorage.setItem("talentiqProfile", JSON.stringify(profile));
    localStorage.setItem("profileComplete", "true");
    alert("Your profile is now visible to recruiters!");
    location.reload();
}

function resetProfile(){
    if(confirm("Delete all data?")){localStorage.clear();location.href='index.html';}
function logout(){localStorage.clear();window.location.href='index.html';}
</script>
</body></html>
