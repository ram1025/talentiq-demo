<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - TalentIQ</title>
<link rel="stylesheet" href="style.css"> <!-- CSS link imp -->
</head>
<body style="background:#f1f5f9;">

<div class="header">
  <h2>👤 My Profile</h2>
  <button onclick="location='dashboard.html'">← Back</button>
</div>

<div class="card">
    <h3>🤖 AI Auto-Filled Profile</h3>
    <p style="font-size:13px; color:#64748b; margin-bottom:20px;">Resume nundi teesina data. Only 3 fields manual.</p>

    <div class="form-group"><label>Full Name</label><input type="text" id="name" readonly></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" readonly></div>
    <div class="form-group"><label>Designation</label><input type="text" id="designation" readonly></div>
    <div class="form-group"><label>Skills</label><input type="text" id="skills" readonly></div>
    <div class="form-group"><label>Experience (Years)</label><input type="text" id="exp" readonly></div>
    <div class="form-group"><label>LinkedIn URL</label><input type="text" id="linkedin" placeholder="linkedin.com/in/yourname"></div>
    <div class="form-group"><label>GitHub URL</label><input type="text" id="github" placeholder="github.com/yourname"></div>
    <div class="form-group"><label>Portfolio</label><input type="text" id="portfolio" placeholder="yourname.dev"></div>

    <!-- MANUAL DROPDOWNS ONLY -->
    <div class="form-group">
        <label>Notice Period *</label>
        <select id="jobType">
            <option>Select</option>
            <option>Immediate</option>
            <option>15 Days</option>
            <option>30 Days</option>
            <option>60 Days</option>
        </select>
    </div>
    <div class="form-group">
        <label>Preferred Location *</label>
        <select id="location">
            <option>Select</option>
            <option>Visakhapatnam</option>
            <option>Hyderabad</option>
            <option>Bangalore</option>
            <option>Remote</option>
        </select>
    </div>
    <div class="form-group">
        <label>Work Mode *</label>
        <select id="workMode">
            <option>Select</option>
            <option>WFO</option>
            <option>Hybrid</option>
            <option>Remote</option>
        </select>
    </div>

    <button class="btn-primary" onclick="saveProfile()">Save & Make Profile Live</button>
</div>

<script>
// Page load ayyagane dashboard nundi data techi fill cheyi
window.onload = function(){
    if(localStorage.getItem('talentiq_loggedin')!=='true'){ window.location.href = 'index.html'; }
    loadProfileData();
}

function loadProfileData(){
    let profile = JSON.parse(localStorage.getItem("talentiqProfile") || '{}');
    
    // AI auto-filled fields - readonly
    document.getElementById('name').value = profile.name || '';
    document.getElementById('email').value = profile.email || '';
    document.getElementById('designation').value = profile.designation || '';
    document.getElementById('skills').value = profile.skills || '';
    document.getElementById('exp').value = profile.exp || '';
    
    // Manual fields - user edit cheyavachu
    document.getElementById('linkedin').value = profile.linkedin || '';
    document.getElementById('github').value = profile.github || '';
    document.getElementById('portfolio').value = profile.portfolio || '';
    document.getElementById('jobType').value = profile.jobType || 'Select';
    document.getElementById('location').value = profile.location || 'Select';
    document.getElementById('workMode').value = profile.workMode || 'Select';
}

function saveProfile(){
    let profile = JSON.parse(localStorage.getItem("talentiqProfile") || '{}');
    
    // Only 3 manual fields + links update cheyi
    profile.linkedin = document.getElementById('linkedin').value;
    profile.github = document.getElementById('github').value;
    profile.portfolio = document.getElementById('portfolio').value;
    profile.jobType = document.getElementById('jobType').value;
    profile.location = document.getElementById('location').value;
    profile.workMode = document.getElementById('workMode').value;

    if(profile.jobType==='Select' || profile.location==='Select' || profile.workMode==='Select'){
        alert('Please select Notice Period, Location and Work Mode');
        return;
    }

    localStorage.setItem("talentiqProfile", JSON.stringify(profile));
    localStorage.setItem("profileComplete", "true");
    alert("Profile Live ✅ Now you can see jobs in Dashboard");
    location.href = 'dashboard.html';
}
</script>
</body>
</html>
