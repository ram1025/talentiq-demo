<!DOCTYPE html>
<html>
<head>
<title>TALENTIQ - AI Job Matching</title>
<style>
body {font-family: Arial; background: #f0f4f8; padding: 20px;}
.container {max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px;}
input, select, textarea {width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;}
.btn {background: #4f46e5; color: white; padding: 14px; border: none; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer;}
.notif {background: #dcfce7; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #22c55e;}
.ai-badge {background: #fef3c7; padding: 5px 10px; border-radius: 20px; font-size: 12px; color: #92400e;}
</style>
</head>
<body>
<div class="container">
    <h2>TALENTIQ <span class="ai-badge">AI Powered</span></h2>
    
    <div id="notifications"></div>

    <h3>Step 1: Upload Resume <span class="ai-badge">Auto Fill ON</span></h3>
    <input type="file" id="resumeFile" accept=".pdf,.doc,.docx,.txt" onchange="autoFillResume()">
    <p style="font-size:12px; color:gray;">Upload cheste AI automatic ga kindi fields fill chesthundi</p>

    <h3>Step 2: Verify & Save</h3>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="designation" placeholder="Current Designation e.g: Senior Recruiter">
    
    <select id="jobType">
        <option value="">Job Status / Notice Period</option>
        <option value="Immediately">Immediately Available</option>
        <option value="15 Days">15 Days Notice</option>
        <option value="30 Days">30 Days Notice</option>
        <option value="60 Days">60 Days Notice</option>
        <option value="Searching">Actively Searching</option>
    </select>

    <input type="text" id="skills" placeholder="Skills: Java, React, Recruitment, ATS">
    <input type="text" id="location" placeholder="Location: Visakhapatnam">
    <input type="number" id="exp" placeholder="Total Experience in Years">
    
    <button class="btn" onclick="saveProfile()">Save & Make Profile Live</button>
</div>

<script>
// FAKE AI PARSER - Demo kosam. Real lo ChatGPT API use chestham
function autoFillResume() {
    let file = document.getElementById('resumeFile').files[0];
    if(!file) return;

    alert("AI is scanning your resume... Please wait 2 seconds");

    // Demo kosam fake data. Real lo PDF text ni read chesi extract chestham
    setTimeout(() => {
        // Resume name nunchi guess cheyadam
        let fakeName = file.name.split('_')[0] || "Ganesh Ram Makina";
        let fakeSkills = "Java, J2EE, Spring Boot, WebSphere, Kibana, Grafana, Recruitment, ATS";
        let fakeExp = "9";
        let fakeLocation = "Visakhapatnam";
        let fakeDesg = "IT Support Specialist & Senior Talent Acquisition";

        document.getElementById('name').value = fakeName;
        document.getElementById('skills').value = fakeSkills;
        document.getElementById('exp').value = fakeExp;
        document.getElementById('location').value = fakeLocation;
        document.getElementById('designation').value = fakeDesg;
        document.getElementById('jobType').value = "30 Days";

        alert("✅ AI Auto-Fill Complete! Please verify details and click Save");
    }, 2000);
}

window.onload = function() {
    let views = localStorage.getItem("profileViews") || 0;
    if(views > 0) {
        document.getElementById('notifications').innerHTML = 
        `<div class="notif">🔔 ${views} Recruiter(s) viewed your profile in last 24 hours</div>`;
    }
}

function saveProfile() {
    let profile = {
        name: document.getElementById('name').value,
        designation: document.getElementById('designation').value,
        jobType: document.getElementById('jobType').value,
        skills: document.getElementById('skills').value,
        location: document.getElementById('location').value,
        exp: document.getElementById('exp').value,
        resumeFile: document.getElementById('resumeFile').files[0].name
    };
    localStorage.setItem("talentiqProfile", JSON.stringify(profile));
    alert("Profile Saved! Now visible to 100+ companies in RECRUZEN");
}
</script>
</body>
</html>
