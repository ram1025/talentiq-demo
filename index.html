    body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }

        cursor: pointer;

<body>

<div class="container">
    <h1>🚀 TALENTIQ</h1>
    <p style="text-align:center;">Upload Resume & Go Live in 60 Seconds</p>

    <label>Upload Resume PDF</label>
    <input type="file" id="resumeFile" accept=".pdf">

    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Auto-filled from Resume">

    <label>Designation</label>
    <input type="text" id="designation" placeholder="Auto-filled from Resume">

    <label>Skills</label>
    <textarea id="skills" rows="3" placeholder="Auto-filled from Resume"></textarea>

    <label>Location</label>
    <input type="text" id="location" placeholder="Auto-filled from Resume">

    <label>Notice Period</label>
    <input type="text" id="notice" placeholder="e.g. 30 Days">

    <!-- GREEN SAVE BUTTON -->
    <button class="btn-green" onclick="saveProfile()">Create Profile & Make Live</button>

    <div id="status"></div>
</div>

<script>
// PDF READ + AUTO FILL LOGIC
document.getElementById('resumeFile').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('status').innerText = "⏳ Scanning Resume...";

    const fileReader = new FileReader();
    fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let text = '';
        for(let i = 0; i < pdf.numPages; i++) {
            const page = await pdf.getPage(i + 1);
            const content = await page.getTextContent();
            text += content.items.map(item => item.text).join(' ');
        }
        autoFillFields(text, file.name);
    };
    fileReader.readAsArrayBuffer(file);
});

function autoFillFields(text, filename){
    // Name: Capital words 2
    const nameMatch = text.match(/[A-Z][a-z]+ [A-Z][a-z]+/);
    if(nameMatch) document.getElementById('fullName').value = nameMatch[0];

    // Skills
    const skills = ['Java', 'Python', 'React', 'JavaScript', 'SQL', 'AWS', 'Support', 'IT', 'HTML', 'CSS', 'Communication'];
    const foundSkills = skills.filter(s => text.toLowerCase().includes(s.toLowerCase()));
    if(foundSkills.length > 0) document.getElementById('skills').value = foundSkills.join(', ');

    // Location
    const locMatch = text.match(/Hyderabad|Bangalore|Pune|Mumbai|Delhi|Visakhapatnam|Chennai/i);
    if(locMatch) document.getElementById('location').value = locMatch[0];

    // Designation
    const desMatch = text.match(/Engineer|Developer|Support|Analyst|Manager|Executive/i);
    if(desMatch) document.getElementById('designation').value = desMatch[0];

    document.getElementById('status').innerText = `✅ Resume scanned! Details auto-filled.`;
    document.getElementById('resumeFile').dataset.filename = filename;
}

// SAVE + SYNC TO RECRUZEN
function saveProfile(){
    const profile = {
        name: document.getElementById('fullName').value,
        designation: document.getElementById('designation').value,
        skills: document.getElementById('skills').value,
        location: document.getElementById('location').value,
        notice: document.getElementById('notice').value,
        resumeFile: document.getElementById('resumeFile').dataset.filename || "Resume.pdf",
        source: "TALENTIQ",
        timestamp: new Date().toISOString()
    };

    if(!profile.name){ alert("Please upload resume or fill name"); return; }

    localStorage.setItem('talentiq_profile', JSON.stringify(profile));
    document.getElementById('status').innerText = "✅ Saved Successfully! Now check RECRUZEN ATS";
    alert("✅ Profile Live! Go to RECRUZEN and Search");
}
</script>
