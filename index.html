<!DOCTYPE html>
<html>
<head><title>TalentIQ Login</title><link rel="stylesheet" href="style.css"><meta name="viewport" content="width=device-width"></head>
<body class="login-bg">
<div class="login-container">
  <div class="login-box">
    <h1>TalentIQ 🤖</h1>
    <div class="input-group"><label>Email ID</label><input type="email" id="email" placeholder="Enter Email ID"></div>
    <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="Enter Password"></div>
    <button class="login-btn" onclick="login()">Login</button>
    <div class="demo-box"><b>Demo Login</b><br>Email: candidate@talentiq.com<br>Password: candidate123</div>
  </div>
  <p class="made-in-india">Made in India 🇮🇳</p>
</div>
<script>
function login(){
    let e=document.getElementById('email').value; let p=document.getElementById('password').value;
    if(e==='candidate@talentiq.com'&&p==='candidate123'){localStorage.setItem('talentiq_loggedin','true');window.location.href='dashboard.html';}
    else{alert('Invalid credentials')}
}
</script>
</body>
</html>
